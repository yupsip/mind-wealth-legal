<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>마음일기 — 약관 및 정책</title>
<style>
  :root { --teal:#14B8A6; --purple:#A855F7; --ink:#111827; --gray:#6B7280; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    color: var(--ink); line-height: 1.7; margin: 0; background:#fff; }
  .wrap { max-width: 600px; margin: 0 auto; padding: 64px 22px; text-align: center; }
  .badge { width: 72px; height: 72px; border-radius: 999px; background:#F0FDFA;
    border:2px solid var(--teal); display:flex; align-items:center; justify-content:center;
    margin: 0 auto 20px; font-size: 32px; }
  h1 { font-size: 24px; font-weight: 800; margin: 0 0 6px; }
  .sub { color: var(--gray); font-size: 14px; margin: 0 0 36px; }
  a.card { display:block; text-decoration:none; color:var(--ink);
    border:1.5px solid #E5E7EB; border-radius:16px; padding:20px;
    margin: 12px 0; text-align:left; }
  a.card:hover { border-color: var(--teal); }
  a.card .t { font-size: 17px; font-weight: 700; }
  a.card .d { font-size: 13px; color: var(--gray); margin-top: 4px; }
  footer { margin-top: 40px; color: var(--gray); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">📖</div>
  <h1>마음일기</h1>
  <p class="sub">약관 및 개인정보 정책</p>

  <a class="card" href="privacy.html">
    <div class="t">개인정보처리방침</div>
    <div class="d">어떤 정보를 어떻게 수집·보관·파기하는지</div>
  </a>
  <a class="card" href="terms.html">
    <div class="t">이용약관</div>
    <div class="d">서비스 이용 조건, 구독·결제, 권리·의무</div>
  </a>

  <footer>
    매일 한 줄, AI 가 당신을 발견합니다.<br />
    ⓒ 2026 마음일기
  </footer>
</div>
</body>
</html>
